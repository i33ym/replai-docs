name: Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.deb
          sudo dpkg -i hugo_extended_0.157.0_linux-amd64.deb
          rm hugo_extended_0.157.0_linux-amd64.deb

      - name: Build
        run: hugo --minify

      - name: Deploy
        run: sudo rsync -av --delete public/ /var/www/docs.replai.uz/